name: CI Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Login to DockerHub
      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3️⃣ Build & Push Backend
      - name: Build Backend Image
        run: |
          docker build -t $IMAGE_BACKEND:${{ github.sha }} ./Backend
          docker push $IMAGE_BACKEND:${{ github.sha }}

      # 4️⃣ Build & Push Frontend
      - name: Build Frontend Image
        run: |
          docker build -t $IMAGE_FRONTEND:${{ github.sha }} ./Frontend
          docker push $IMAGE_FRONTEND:${{ github.sha }}

      # 5️⃣ Update Kubernetes manifests (IMPORTANT)
      - name: Update image tags in manifests
        run: |
          sed -i "s|IMAGE_BACKEND|$IMAGE_BACKEND:${{ github.sha }}|g" k8s/backend/deployment.yaml
          sed -i "s|IMAGE_FRONTEND|$IMAGE_FRONTEND:${{ github.sha }}|g" k8s/frontend/deployment.yaml

      # 6️⃣ Commit updated manifests
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/
          git commit -m "Update image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push
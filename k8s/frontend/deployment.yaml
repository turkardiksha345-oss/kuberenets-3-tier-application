apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: dikshat1024/frontend:latest

          ports:
            - containerPort: 80

          env:
            - name: REACT_APP_API
              value: http://backend:5000
version: "3"

services:
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  backend:
    build:
      context: ..                 # go one level up
      dockerfile: Docker/backend.Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/cafe
    depends_on:
      - mongo

  frontend:
    build:
      context: ..
      dockerfile: Docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend